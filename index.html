<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Email Sender</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f5f5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:400px;
      background:white;
      padding:30px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      text-align:center;
    }

    h2{
      margin-bottom:20px;
      color:#222;
    }

    input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:16px;
      margin-bottom:15px;
    }

    input:focus{
      border-color:#22c55e;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#16a34a;
    }

    .hidden{
      display:none;
    }

    .loader-box{
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      margin-top:10px;
    }

    .loader{
      width:70px;
      height:70px;
      border:6px solid #ddd;
      border-top:6px solid #22c55e;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    .loader-text{
      margin-top:12px;
      color:#555;
      font-weight:bold;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    .result{
      display:none;
      flex-direction:column;
      align-items:center;
      animation:fade 0.4s ease;
    }

    .circle{
      width:85px;
      height:85px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:42px;
      font-weight:bold;
      animation:pop 0.4s ease;
    }

    .success{
      background:#22c55e;
    }

    .error{
      background:#ef4444;
    }

    .result p{
      margin-top:12px;
      font-weight:bold;
      color:#333;
    }

    @keyframes pop{
      from{
        transform:scale(0);
      }
      to{
        transform:scale(1);
      }
    }

    @keyframes fade{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

  </style>

</head>

<body>

  <div class="card">

    <h2>Email Sender</h2>

    <!-- FORM -->
    <div id="formBox">

      <input
        type="text"
        id="message"
        placeholder="Enter your message"
        onkeydown="handleEnter(event)"
      >

      <button onclick="sendEmail()">
        Send Email
      </button>

    </div>

    <!-- LOADER -->
    <div class="loader-box" id="loaderBox">

      <div class="loader"></div>

      <div class="loader-text">
        Sending...
      </div>

    </div>

    <!-- RESULT -->
    <div class="result" id="resultBox">

      <div class="circle" id="resultCircle">
        ✓
      </div>

      <p id="resultText">
        Email Sent Successfully
      </p>

    </div>

  </div>

  <script>

    function handleEnter(event){

  if(event.key === "Enter"){

    sendEmail();

  }

}

async function sendEmail(){

  const message =
    document.getElementById("message").value;

  if(!message.trim()){

    alert("Please enter message");

    return;

  }

  /*
    HIDE FORM
  */

  document.getElementById("formBox")
    .style.display = "none";

  /*
    SHOW LOADER
  */

  document.getElementById("loaderBox")
    .style.display = "flex";

  try{

    const response = await fetch(

      "https://email-server-production-7715.up.railway.app/send-email",

      {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          message
        })

      }

    );

    /*
      PARSE JSON
    */

    const data = await response.json();

    console.log(data);

    /*
      HIDE LOADER
    */

    document.getElementById("loaderBox")
      .style.display = "none";

    /*
      SHOW RESULT
    */

    document.getElementById("resultBox")
      .style.display = "flex";

    const circle =
      document.getElementById("resultCircle");

    const text =
      document.getElementById("resultText");

    /*
      RESET CLASSES
    */

    circle.classList.remove("success");
    circle.classList.remove("error");

    /*
      SUCCESS CHECK
    */

    if(response.ok && data.success){

      circle.classList.add("success");

      circle.innerHTML = "✓";

      text.innerHTML =
        "Email Sent Successfully";

    }else{

      circle.classList.add("error");

      circle.innerHTML = "✕";

      text.innerHTML =
        data.error ||
        data.message ||
        "Failed To Send Email";

    }

  }catch(error){

    console.log(error);

    /*
      HIDE LOADER
    */

    document.getElementById("loaderBox")
      .style.display = "none";

    /*
      SHOW RESULT
    */

    document.getElementById("resultBox")
      .style.display = "flex";

    const circle =
      document.getElementById("resultCircle");

    const text =
      document.getElementById("resultText");

    /*
      ERROR UI
    */

    circle.classList.remove("success");

    circle.classList.add("error");

    circle.innerHTML = "✕";

    text.innerHTML =
      "Server Error";

  }

}

</script>

</body>
</html>
